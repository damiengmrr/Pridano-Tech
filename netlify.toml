[build]
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/quote/chat"
  to = "/.netlify/functions/quote-chat"
  status = 200

[[redirects]]
  from = "/api/quote/qualify"
  to = "/.netlify/functions/quote-qualify"
  status = 200

[[redirects]]
  from = "/api/quote/summary"
  to = "/.netlify/functions/quote-summary"
  status = 200

[[redirects]]
  from = "/api/send-brief"
  to = "/.netlify/functions/send-brief"
  status = 200

[[redirects]]
  from = "/api/quote/submit"
  to = "/.netlify/functions/send-brief"
  status = 200
